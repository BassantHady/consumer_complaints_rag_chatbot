name: Build and deploy Python app to Azure Web App - Customer-Complaints-rag-chatbot-frontend
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/main_customer-complaints-rag-chatbot-frontend.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create and Start virtual environment and Install dependencies
        working-directory: frontend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            frontend
            !frontend/antenv

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ED97DB5D65C2487DB58D1559378E9812 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C85500E80CD743BCA7E39F5140A3CF1A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1C5197CEDEF14DB181E4AD2277BD7289 }}
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Customer-Complaints-rag-chatbot-frontend'
          slot-name: 'Production'