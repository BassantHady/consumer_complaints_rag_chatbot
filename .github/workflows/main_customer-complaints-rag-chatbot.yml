name: Build and deploy Python app to Azure Web App - Customer-Complaints-rag-chatbot
on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main_customer-complaints-rag-chatbot.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Create and Start virtual environment and Install dependencies
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend
            data
            models
            !backend/antenv

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      - name: Copy data and models into backend
        run: |
          cp -r data backend/data
          cp -r models backend/models
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend
            !backend/antenv
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_07B377D65D70469AA23DFA4F642AB5BE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_093DBF2DC95145D484BB74D67035C90F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CA9AF36EE71C4BDBBE9318E8855B1D75 }}
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Customer-Complaints-rag-chatbot'
          slot-name: 'Production'
          package: backend